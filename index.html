<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI角色 · 完全采用您的LINE风格</title>
    <!-- Font Awesome 6 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== 基础样式：彻底去除所有边距，全屏自适应 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: #fff;
            overflow: hidden;
        }

        /* 主屏幕容器 */
        .phone-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 桌面 */
        .desktop {
            flex: 1;
            background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            min-height: 0;
        }
        /* 仿iOS状态栏样式 */
        .status-bar {
            padding: 12px 20px 4px;
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            font-weight: 600;
            color: white;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), transparent);
            position: sticky;
            top: 0;
            z-index: 10;
            width: 100%;
            letter-spacing: 0.2px;
        }
        .status-bar span:last-child {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .status-bar i {
            font-size: 14px;
            color: white;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        .app-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 20px 16px;
            align-content: start;
        }
        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .app-icon:active {
            transform: scale(0.95);
        }
        .icon-bg {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(5px);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: #333;
            overflow: hidden;
        }
        .icon-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .app-label {
            color: white;
            font-size: 11px;
            font-weight: 500;
            text-shadow: 0 1px 3px black;
            max-width: 70px;
            text-align: center;
        }
        .dock {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(20px);
            margin: 0 16px 16px;
            padding: 8px 12px;
            border-radius: 40px;
            display: flex;
            justify-content: space-around;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .dock .app-icon .icon-bg {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: rgba(255,255,255,0.9);
            font-size: 28px;
        }
        .home-button {
            width: 140px;
            height: 5px;
            background: rgba(255,255,255,0.6);
            border-radius: 3px;
            margin: 8px auto 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .home-button:active {
            background: white;
        }

        /* 应用视图（全屏覆盖） */
        .app-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 20;
            display: none;
            flex-direction: column;
            transition: transform 0.2s ease;
        }
        .app-view.active {
            display: flex;
        }

        /* 写实简约风返回按钮样式（无背景，纯箭头） */
        .back-btn {
            font-size: 20px;
            color: #007aff;
            cursor: pointer;
            padding: 8px;
            margin-right: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .back-btn:hover {
            opacity: 0.8;
        }
        /* 聊天详情页和联系人选项页的返回箭头保持不变（已无圆圈） */
        #backToListBtn {
            cursor: pointer;
            font-size: 20px;
            color: #007aff;
            width: auto;
            height: auto;
            border-radius: 0;
            background-color: transparent;
            display: inline;
            padding: 8px;
        }
        #backToListBtn:hover {
            background-color: transparent;
        }
        #backToChatBtn {
            cursor: pointer;
            font-size: 20px;
            color: #007aff;
            width: auto;
            height: auto;
            border-radius: 0;
            background-color: transparent;
            display: inline;
            margin-right: 8px;
            padding: 8px;
        }
        #backToChatBtn:hover {
            background-color: transparent;
        }

        /* ===== 设置界面样式 ===== */
        .settings-container {
            flex: 1;
            padding: 16px;
            background: #f5f5f5;
            overflow-y: auto;
        }
        .config-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .config-header h3 {
            font-size: 18px;
            font-weight: 600;
        }
        .add-config-btn {
            background: #07c160;
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .config-item {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            position: relative;
        }
        .config-item.active {
            border: 2px solid #07c160;
        }
        .config-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .config-name {
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .active-badge {
            background: #07c160;
            color: white;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 12px;
        }
        .config-actions {
            display: flex;
            gap: 8px;
        }
        .config-actions button {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            color: #555;
        }
        .config-detail {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            word-break: break-all;
        }
        .config-detail div {
            margin-bottom: 4px;
        }
        .config-model-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 8px;
        }
        .config-model-row select {
            flex: 2;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: white;
            user-select: text;
        }
        .config-model-row button {
            flex: 1;
            padding: 8px;
            background: #07c160;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .edit-form {
            background: #f0f2f5;
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
        }
        .edit-form input {
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            user-select: text;
            -webkit-user-select: text;
        }
        .edit-form button {
            padding: 8px 16px;
            background: #07c160;
            color: white;
            border: none;
            border-radius: 8px;
            margin-right: 8px;
        }
        .edit-form .cancel-btn {
            background: #999;
        }
        .activate-config {
            margin-top: 8px;
            width: 100%;
            padding: 8px;
            background: #07c160;
            color: white;
            border: none;
            border-radius: 8px;
        }

        /* ===== 仿LINE最新版联系人列表样式 ===== */
        .contact-list {
            background: #fff;
        }
        /* 用户个人资料区域 */
        .user-profile {
            display: flex;
            align-items: center;
            padding: 16px;
            background: #ffffff;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }
        .user-info {
            flex: 1;
        }
        .user-name-input {
            font-size: 18px;
            font-weight: 600;
            border: none;
            outline: none;
            background: transparent;
            padding: 4px 0;
            width: 100%;
        }
        .user-status-input {
            font-size: 14px;
            color: #666;
            border: none;
            outline: none;
            background: transparent;
            padding: 4px 0;
            width: 100%;
        }
        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #07c160;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            margin-left: 16px;
            cursor: pointer;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 聊天列表头部（保留返回和新建） */
        .chats-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #ffffff;
            border-bottom: 1px solid #f0f0f0;
        }
        .chats-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chats-header-left h2 {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: -0.3px;
        }
        .chats-header-right {
            display: flex;
            align-items: center;
        }
        .circle-plus {
            display: inline-block;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f0f0f0;
            text-align: center;
            line-height: 36px;
            font-size: 26px;
            font-weight: 300;
            cursor: pointer;
            color: #555;
            transition: background 0.2s;
        }
        .circle-plus:hover {
            background: #e0e0e0;
        }
        /* 好友界面搜索框 */
        .search-container {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            background: #f5f5f5;
            border-bottom: 1px solid #f0f0f0;
        }
        .search-container i {
            font-size: 16px;
            color: #999;
            margin-right: 8px;
        }
        .search-container input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 16px;
            padding: 8px 0;
        }
        .search-container input::placeholder {
            color: #aaa;
        }
        /* 底部导航栏 */
        .tab-bar {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 8px 0 4px;
            background: #ffffff;
            border-top: 1px solid #f0f0f0;
            border-bottom: none;
            margin-top: auto;
        }
        .tab-item {
            flex: 1;
            text-align: center;
            font-size: 12px;
            color: #999;
            padding: 4px 0 6px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            transition: color 0.2s;
        }
        .tab-item i {
            font-size: 22px;
        }
        .tab-item.active {
            color: #06c755;
            font-weight: 500;
        }
        .tab-content {
            flex: 1;
            overflow-y: auto;
            background: #fff;
        }
        .contact-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #f5f5f5;
            cursor: pointer;
        }
        .contact-avatar {
            width: 52px;
            height: 52px;
            background: #06c755;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 26px;
            margin-right: 14px;
            flex-shrink: 0;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .contact-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .contact-info {
            flex: 1;
            min-width: 0;
        }
        .contact-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .contact-name {
            font-weight: 600;
            font-size: 16px;
            color: #1a1a1a;
        }
        .contact-time {
            font-size: 12px;
            color: #999;
            margin-left: 8px;
            white-space: nowrap;
        }
        .contact-lastmsg {
            color: #666;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .unread-badge {
            background: #06c755;
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 16px;
            min-width: 22px;
            text-align: center;
            margin-left: 10px;
            line-height: 1.2;
        }
        .blocked-badge {
            color: #ff3b30;
            font-size: 12px;
            margin-left: 6px;
        }

        /* ===== 新建/编辑联系人模态框 ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 30;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 340px;
            border-radius: 20px;
            padding: 20px;
            max-height: 80%;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .modal-header h3 {
            font-size: 18px;
        }
        .close-modal {
            font-size: 24px;
            cursor: pointer;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 4px;
            color: #666;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 15px;
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .avatar-type {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .avatar-type label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            color: #333;
        }
        .avatar-preview {
            width: 60px;
            height: 60px;
            background: #07c160;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            margin: 10px 0;
            overflow: hidden;
        }
        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .upload-btn {
            background: #07c160;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            display: inline-block;
            margin-top: 5px;
        }
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .form-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .form-actions .save-btn {
            background: #07c160;
            color: white;
        }
        .form-actions .cancel-btn {
            background: #f0f0f0;
            color: #333;
        }

        /* ===== 聊天详情页 - 圆润气泡（无尖角），撤回消息采用系统消息样式 ===== */
        .chat-detail {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #87CEFA;
            min-height: 0;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background-color: transparent;
            color: #000;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 500;
        }
        .header-left span:first-child {
            cursor: pointer;
        }
        .header-right {
            display: flex;
            gap: 16px;
            font-size: 20px;
        }
        .header-right span {
            cursor: pointer;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 10px 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            -webkit-overflow-scrolling: touch;
            background: #87CEFA;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%2387CEFA"/><circle cx="20" cy="20" r="15" fill="%23fff" opacity="0.1"/><circle cx="80" cy="80" r="20" fill="%23fff" opacity="0.1"/></svg>');
        }

        .message {
            display: flex;
            align-items: flex-start;  /* 修改为顶部对齐，解决头像在气泡底部的问题 */
            max-width: 85%;
        }
        .message.other {
            align-self: flex-start;
        }
        .message.me {
            align-self: flex-end;
            flex-direction: row-reverse;
            align-items: flex-start;  /* 同时修改自己的消息也为顶部对齐 */
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #ddd;
            margin: 0 8px;
            flex-shrink: 0;
            overflow: hidden;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bubble-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        /* ----- 圆润气泡样式（无尖角）----- */
        .msg-bubble {
            padding: 10px 14px;
            font-size: 16px;
            line-height: 1.4;
            position: relative;
            border-radius: 20px; /* 统一大圆角 */
            max-width: 100%;
            word-break: break-word;
        }

        .message.other .msg-bubble {
            background-color: #ffffff;
            color: #000;
        }

        .message.me .msg-bubble {
            background-color: #00C73C;
            color: #fff;
        }

        /* 图片消息样式 */
        .message .msg-bubble img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            display: block;
        }

        .msg-time {
            font-size: 11px;
            color: #666;
            margin: 0 6px;
            white-space: nowrap;
        }
        /* 自己消息的时间戳：移到绿色气泡前方（左侧），并调整间距使其更贴近气泡 */
        .message.me .msg-time {
            order: -1;
            margin: 0 2px 0 6px;
        }

        /* 系统消息样式（用于聊天记录清空和撤回消息） */
        .system-message {
            align-self: center;
            background-color: #e0e0e0;
            color: #666;
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 20px;
            max-width: 90%;
            margin: 8px 0;
        }

        .input-area {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background-color: #f7f7f7;
            border-top: 1px solid #dbdbdb;
            gap: 10px;
            flex-shrink: 0;
        }
        .input-btn {
            font-size: 20px;
            color: #888;
            cursor: pointer;
            width: 24px;
            text-align: center;
        }
        .input-btn:hover {
            color: #00C73C;
        }
        .input-field-container {
            position: relative;
            flex-grow: 1;
        }
        .input-field {
            width: 100%;
            padding: 8px 36px 8px 12px;
            border: 1px solid #dbdbdb;
            border-radius: 18px;
            outline: none;
            font-size: 16px;
            background-color: #fff;
        }
        .input-field:focus {
            border-color: #00C73C;
        }
        .input-field:disabled {
            background-color: #f0f0f0;
            color: #aaa;
        }
        .input-smile {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #888;
            cursor: pointer;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .input-smile:hover {
            color: #00C73C;
        }
        #recordBtn {
            margin-left: 0;
        }

    <script>
        // ==================== 常量定义 ====================
        const BACKEND_URL = '';
        const TOAST_DURATION = 2000;
        const API_ERRORS = {
            429: '请求过于频繁，请稍后再试 (429)',
            401: 'API密钥无效或权限不足',
            403: 'API密钥无效或权限不足',
        };
        const DB_NAME = 'AIChatDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'images';
        const INITIAL_MESSAGE_COUNT = 20; // 初始加载消息数量
        const LOAD_MORE_COUNT = 10;        // 每次加载更多数量

        // ==================== 工具函数模块 ====================
        const Utils = {
            showToast(message, duration = TOAST_DURATION) {
                const toast = document.getElementById('toast');
                const toastMsg = document.getElementById('toastMessage');
                toastMsg.textContent = message;
                toast.style.display = 'block';
                if (window.toastTimer) clearTimeout(window.toastTimer);
                window.toastTimer = setTimeout(() => {
                    toast.style.display = 'none';
                }, duration);
            },

            compressImage(dataUrl, maxSize = 800, quality = 0.9) {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;
                        if (width > height) {
                            if (width > maxSize) {
                                height = Math.round(height * (maxSize / width));
                                width = maxSize;
                            }
                        } else {
                            if (height > maxSize) {
                                width = Math.round(width * (maxSize / height));
                                height = maxSize;
                            }
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                        resolve(compressedDataUrl);
                    };
                    img.onerror = () => reject(new Error('图片加载失败'));
                    img.src = dataUrl;
                });
            },

            getDisplayName(contact) {
                return contact.remark && contact.remark.trim() !== '' ? contact.remark : contact.name;
            },

            getLastMessageForList(contact) {
                if (contact.muted && contact.mutedLastMessage !== undefined) {
                    return contact.mutedLastMessage;
                }
                const lastMsg = contact.messages.length ? contact.messages[contact.messages.length-1] : null;
                if (!lastMsg) return '';
                if (lastMsg.type === 'image') return '[图片]';
                if (lastMsg.type === 'recall') return '已撤回';
                return lastMsg.content || '';
            },

            // 修改：formatTime 可接受时间戳参数，若传入则格式化该时间，否则返回当前时间
            formatTime(timestamp) {
                let date = timestamp ? new Date(timestamp) : new Date();
                return date.getHours() + ':' + (date.getMinutes() < 10 ? '0' + date.getMinutes() : date.getMinutes());
            },

            // ---------- IndexedDB 操作 ----------
            openDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result);
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                        }
                    };
                });
            },

            async saveImageToDB(imageId, dataUrl) {
                const db = await this.openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    const request = store.put({ id: imageId, data: dataUrl });
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            },

            async loadImageFromDB(imageId) {
                if (!imageId) return null;
                const db = await this.openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readonly');
                    const store = tx.objectStore(STORE_NAME);
                    const request = store.get(imageId);
                    request.onsuccess = () => resolve(request.result ? request.result.data : null);
                    request.onerror = () => reject(request.error);
                });
            },

            async deleteImageFromDB(imageId) {
                const db = await this.openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    const request = store.delete(imageId);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            },

            generateImageId(prefix = 'img') {
                return `${prefix}_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
            },

            isBase64Image(str) {
                return typeof str === 'string' && str.startsWith('data:image');
            },

            // 辅助函数：设置图片元素（支持ID或base64）
            async setImageElement(el, imageData, defaultText = '🤖') {
                if (!imageData) {
                    el.textContent = defaultText;
                    return;
                }
                if (this.isBase64Image(imageData)) {
                    el.innerHTML = `<img src="${imageData}" alt="avatar">`;
                } else if (typeof imageData === 'string' && !imageData.startsWith('data:')) {
                    // 可能是 ID
                    const dataUrl = await this.loadImageFromDB(imageData);
                    if (dataUrl) {
                        el.innerHTML = `<img src="${dataUrl}" alt="avatar">`;
                    } else {
                        el.textContent = defaultText;
                    }
                } else {
                    // 文字
                    el.textContent = imageData;
                }
            },

            // 辅助函数：设置背景图片（支持ID或base64），并确保不重复、覆盖容器
            async setBackgroundImage(element, imageId, defaultUrl = null) {
                if (!imageId) {
                    element.style.backgroundImage = defaultUrl ? `url('${defaultUrl}')` : 'none';
                    element.style.backgroundSize = 'cover';
                    element.style.backgroundPosition = 'center';
                    element.style.backgroundRepeat = 'no-repeat';
                    return;
                }
                if (this.isBase64Image(imageId)) {
                    element.style.backgroundImage = `url('${imageId}')`;
                } else {
                    const dataUrl = await this.loadImageFromDB(imageId);
                    if (dataUrl) {
                        element.style.backgroundImage = `url('${dataUrl}')`;
                    } else if (defaultUrl) {
                        element.style.backgroundImage = `url('${defaultUrl}')`;
                    }
                }
                element.style.backgroundSize = 'cover';
                element.style.backgroundPosition = 'center';
                element.style.backgroundRepeat = 'no-repeat';
            },

            // 检测是否为撤回消息
            isRecallMessage(msg) {
                return msg.type === 'recall';
            }
        };

        // ==================== 数据管理模块 ====================
        const DataManager = {
            apiConfigs: [],
            activeConfigId: null,
            contacts: [],
            currentContactId: null,
            userProfile: {
                name: '我的网名',
                status: '在线',
                avatar: '🤖',
                realName: '',
                address: '',
                lineId: '',
                bio: '',
                userSetting: ''
            },
            beautifySettings: {
                wallpaper: null,
                appIcons: {},
                bubbleCss: '',
                chatBackground: null
            },

            // 辅助：处理图片数据，如果是 base64 则存入 DB 返回 ID，否则原样返回
            async processImageForSave(imageData, prefix = 'img') {
                if (!imageData) return null;
                if (Utils.isBase64Image(imageData)) {
                    const id = Utils.generateImageId(prefix);
                    await Utils.saveImageToDB(id, imageData);
                    return id;
                }
                return imageData; // 可能是 ID 或文字
            },

            loadConfigs() {
                const saved = localStorage.getItem('apiConfigs');
                if (saved) {
                    this.apiConfigs = JSON.parse(saved);
                } else {
                    this.apiConfigs = [{
                        id: Date.now().toString(),
                        name: '默认配置',
                        base_url: '',
                        api_key: '',
                        models: [],
                        currentModel: ''
                    }];
                }
                const activeId = localStorage.getItem('activeConfigId');
                if (activeId && this.apiConfigs.some(c => c.id === activeId)) {
                    this.activeConfigId = activeId;
                } else if (this.apiConfigs.length > 0) {
                    this.activeConfigId = this.apiConfigs[0].id;
                }
            },

            saveConfigs() {
                localStorage.setItem('apiConfigs', JSON.stringify(this.apiConfigs));
                if (this.activeConfigId) localStorage.setItem('activeConfigId', this.activeConfigId);
            },

            getActiveConfig() {
                return this.apiConfigs.find(c => c.id === this.activeConfigId) || this.apiConfigs[0];
            },

            loadContacts() {
                const saved = localStorage.getItem('contacts');
                if (saved) {
                    let contacts = JSON.parse(saved);
                    // 迁移旧头像和消息格式
                    contacts = contacts.map(c => {
                        if (c.avatar && Utils.isBase64Image(c.avatar)) {
                            const imageId = Utils.generateImageId('contact_avatar');
                            Utils.saveImageToDB(imageId, c.avatar).catch(console.error);
                            c.avatar = imageId;
                        }
                        // 迁移旧消息格式（没有type字段的设为text）
                        if (c.messages) {
                            const now = Date.now();
                            c.messages = c.messages.map((msg, index) => {
                                if (!msg.type) {
                                    msg.type = 'text';
                                }
                                // 为没有时间戳的消息补充时间戳，按索引递减，最后一条为当前时间
                                if (!msg.timestamp) {
                                    msg.timestamp = now - (c.messages.length - 1 - index) * 60000; // 每条间隔1分钟
                                }
                                return msg;
                            });
                        }
                        c.blocked = c.blocked || false;
                        c.remark = c.remark || '';
                        c.pinned = c.pinned || false;
                        c.muted = c.muted || false;
                        c.mutedLastMessage = c.mutedLastMessage || '';
                        return c;
                    });
                    this.contacts = contacts;
                } else {
                    // 默认联系人添加时间戳
                    this.contacts = [{
                        id: Date.now().toString(),
                        avatar: '🤖',
                        name: '默认助手',
                        remark: '',
                        personality: '你是一个友好的AI助手，乐于助人。',
                        configId: '',
                        blocked: false,
                        pinned: false,
                        muted: false,
                        mutedLastMessage: '',
                        messages: [{ 
                            role: 'assistant', 
                            type: 'text', 
                            content: '你好！我是你的AI助手，有什么可以帮你的？',
                            timestamp: Date.now()
                        }]
                    }];
                }
                if (this.contacts.length > 0) this.currentContactId = this.contacts[0].id;
            },

            saveContacts() {
                localStorage.setItem('contacts', JSON.stringify(this.contacts));
            },

            getCurrentContact() {
                return this.contacts.find(c => c.id === this.currentContactId) || this.contacts[0];
            },

            loadUserProfile() {
                const saved = localStorage.getItem('userProfile');
                if (saved) {
                    let profile = JSON.parse(saved);
                    if (profile.avatar && Utils.isBase64Image(profile.avatar)) {
                        const imageId = Utils.generateImageId('user_avatar');
                        Utils.saveImageToDB(imageId, profile.avatar).catch(console.error);
                        profile.avatar = imageId;
                    }
                    this.userProfile = profile;
                } else {
                    this.userProfile = { ...this.userProfile };
                }
            },

            saveUserProfile() {
                localStorage.setItem('userProfile', JSON.stringify(this.userProfile));
            },

            loadBeautifySettings() {
                const saved = localStorage.getItem('beautifySettings');
                if (saved) {
                    let settings = JSON.parse(saved);
                    // 迁移壁纸
                    if (settings.wallpaper && Utils.isBase64Image(settings.wallpaper)) {
                        const id = Utils.generateImageId('wallpaper');
                        Utils.saveImageToDB(id, settings.wallpaper).catch(console.error);
                        settings.wallpaper = id;
                    }
                    // 迁移聊天背景
                    if (settings.chatBackground && Utils.isBase64Image(settings.chatBackground)) {
                        const id = Utils.generateImageId('chat_bg');
                        Utils.saveImageToDB(id, settings.chatBackground).catch(console.error);
                        settings.chatBackground = id;
                    }
                    // 迁移应用图标
                    if (settings.appIcons) {
                        const newIcons = {};
                        for (let [key, value] of Object.entries(settings.appIcons)) {
                            if (Utils.isBase64Image(value)) {
                                const id = Utils.generateImageId(`icon_${key}`);
                                Utils.saveImageToDB(id, value).catch(console.error);
                                newIcons[key] = id;
                            } else {
                                newIcons[key] = value;
                            }
                        }
                        settings.appIcons = newIcons;
                    }
                    this.beautifySettings = settings;
                } else {
                    this.beautifySettings = { wallpaper: null, appIcons: {}, bubbleCss: '', chatBackground: null };
                }
            },

            saveBeautifySettings() {
                localStorage.setItem('beautifySettings', JSON.stringify(this.beautifySettings));
            }
        };

        // ==================== UI渲染模块 ====================
        const UIManager = {
            async updateUserProfileDisplay() {
                const profile = DataManager.userProfile;
                document.getElementById('userName').value = profile.name || '我的网名';
                document.getElementById('userStatus').value = profile.status || '在线';

                const userAvatarDiv = document.getElementById('userAvatar');
                userAvatarDiv.innerHTML = '';
                const avatarSpan = document.createElement('span');
                avatarSpan.id = 'userAvatarText';
                const avatarImg = document.createElement('img');
                avatarImg.id = 'userAvatarImg';
                avatarImg.style.display = 'none';
                userAvatarDiv.appendChild(avatarSpan);
                userAvatarDiv.appendChild(avatarImg);
                await Utils.setImageElement(userAvatarDiv, profile.avatar, '🤖');

                const profileAvatarDiv = document.getElementById('profileAvatar');
                profileAvatarDiv.innerHTML = '';
                const pSpan = document.createElement('span');
                pSpan.id = 'profileAvatarText';
                const pImg = document.createElement('img');
                pImg.id = 'profileAvatarImg';
                pImg.style.display = 'none';
                profileAvatarDiv.appendChild(pSpan);
                profileAvatarDiv.appendChild(pImg);
                await Utils.setImageElement(profileAvatarDiv, profile.avatar, '🤖');

                document.getElementById('profileName').textContent = profile.name || '我的网名';
                document.getElementById('profileStatus').textContent = profile.status || '在线';
                document.getElementById('profileBio').textContent = profile.bio || '';
                document.getElementById('realName').value = profile.realName || '';
                document.getElementById('address').value = profile.address || '';
                document.getElementById('lineId').value = profile.lineId || '';
                document.getElementById('bio').value = profile.bio || '';
                document.getElementById('userSetting').value = profile.userSetting || '';
            },

            renderContactList() {
                const container = document.getElementById('contactListContainer');
                if (!container) return;
                container.innerHTML = '';

                const sortedContacts = [...DataManager.contacts].sort((a, b) => {
                    if (a.pinned && !b.pinned) return -1;
                    if (!a.pinned && b.pinned) return 1;
                    return 0;
                });

                sortedContacts.forEach(contact => {
                    const lastMsg = contact.messages.length ? contact.messages[contact.messages.length-1] : null;
                    const lastMsgContent = Utils.getLastMessageForList(contact);
                    const lastMsgTime = lastMsg ? Utils.formatTime(lastMsg.timestamp) : '';

                    const item = document.createElement('div');
                    item.className = 'contact-item';
                    item.dataset.id = contact.id;

                    const avatarDiv = document.createElement('div');
                    avatarDiv.className = 'contact-avatar';
                    avatarDiv.textContent = '🤖';
                    Utils.setImageElement(avatarDiv, contact.avatar, '🤖').catch(console.error);
                    item.appendChild(avatarDiv);

                    const infoDiv = document.createElement('div');
                    infoDiv.className = 'contact-info';

                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'contact-row';

                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'contact-name';
                    nameSpan.textContent = Utils.getDisplayName(contact);
                    if (contact.blocked) {
                        const blockSpan = document.createElement('span');
                        blockSpan.className = 'blocked-badge';
                        blockSpan.textContent = '(已拉黑)';
                        nameSpan.appendChild(blockSpan);
                    }
                    rowDiv.appendChild(nameSpan);

                    const timeSpan = document.createElement('span');
                    timeSpan.className = 'contact-time';
                    timeSpan.textContent = lastMsgTime;
                    rowDiv.appendChild(timeSpan);

                    infoDiv.appendChild(rowDiv);

                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'contact-lastmsg';
                    msgDiv.textContent = lastMsgContent;
                    infoDiv.appendChild(msgDiv);

                    item.appendChild(infoDiv);
                    container.appendChild(item);
                });
            },

            renderFriendsList() {
                const container = document.getElementById('friendsListContainer');
                if (!container) return;
                container.innerHTML = '';

                DataManager.contacts.forEach(contact => {
                    const item = document.createElement('div');
                    item.className = 'contact-item';
                    item.dataset.id = contact.id;

                    const avatarDiv = document.createElement('div');
                    avatarDiv.className = 'contact-avatar';
                    avatarDiv.textContent = '🤖';
                    Utils.setImageElement(avatarDiv, contact.avatar, '🤖').catch(console.error);
                    item.appendChild(avatarDiv);

                    const infoDiv = document.createElement('div');
                    infoDiv.className = 'contact-info';

                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'contact-row';

                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'contact-name';
                    nameSpan.textContent = Utils.getDisplayName(contact);
                    if (contact.blocked) {
                        const blockSpan = document.createElement('span');
                        blockSpan.className = 'blocked-badge';
                        blockSpan.textContent = '(已拉黑)';
                        nameSpan.appendChild(blockSpan);
                    }
                    rowDiv.appendChild(nameSpan);

                    infoDiv.appendChild(rowDiv);
                    item.appendChild(infoDiv);
                    container.appendChild(item);
                });
            },

            // 渲染指定范围内的消息
            renderMessages(messages, start, end) {
                const area = document.getElementById('messageArea');
                if (!area) return;
                area.innerHTML = '';

                if (start > 0) {
                    const loadingDiv = document.createElement('div');
                    loadingDiv.className = 'loading-more show';
                    loadingDiv.id = 'loadingMoreIndicator';
                    loadingDiv.textContent = '加载中...';
                    area.appendChild(loadingDiv);
                }

                const contact = DataManager.getCurrentContact();
                const avatarContent = contact.avatar;

                for (let i = start; i < end; i++) {
                    const msg = messages[i];
                    if (!msg) continue;
                    if (msg.role === 'system') {
                        const div = document.createElement('div');
                        div.className = 'system-message';
                        div.textContent = msg.content;
                        area.appendChild(div);
                    } else {
                        // 如果是撤回消息，渲染为系统消息样式
                        if (Utils.isRecallMessage(msg)) {
                            const div = document.createElement('div');
                            div.className = 'system-message';
                            div.textContent = msg.content || '您撤回了一条消息';

        // ==================== 聊天处理模块（含虚拟滚动 + 图片发送 + 消息撤回） ====================
        const ChatHandler = {
            currentVisibleStart: 0,
            currentVisibleEnd: 0,
            isLoadingMore: false,
            prevStart: 0,
            longPressTimer: null,
            longPressMsgIndex: null,

            // 修改：添加消息时记录时间戳
            addMessageToCurrent(text, isUser, isSystem = false, type = 'text') {
                const contact = DataManager.getCurrentContact();
                const role = isSystem ? 'system' : (isUser ? 'user' : 'assistant');
                const msg = { 
                    role, 
                    type, 
                    content: text,
                    timestamp: Date.now()  // 记录发送时间
                };
                contact.messages.push(msg);
                DataManager.saveContacts();
                if (document.getElementById('chatDetailPage').style.display === 'flex') {
                    const total = contact.messages.length;
                    if (this.currentVisibleEnd === total - 1) {
                        this.currentVisibleEnd = total;
                    } else {
                        const area = document.getElementById('messageArea');
                        if (area && area.scrollTop + area.clientHeight >= area.scrollHeight - 50) {
                            this.currentVisibleEnd = total;
                        }
                    }
                    UIManager.renderMessages(contact.messages, this.currentVisibleStart, this.currentVisibleEnd);
                }
                UIManager.renderContactList();
            },

            sendOnlyMessage() {
                const messageInput = document.getElementById('messageInput');
                const text = messageInput.value.trim();
                if (!text) return;

                const contact = DataManager.getCurrentContact();
                if (contact.blocked) {
                    Utils.showToast('你已将对方拉黑，无法发送消息');
                    return;
                }

                this.addMessageToCurrent(text, true, false, 'text');
                messageInput.value = '';
            },

            async sendImage(file) {
                const contact = DataManager.getCurrentContact();
                if (contact.blocked) {
                    Utils.showToast('你已将对方拉黑，无法发送消息');
                    return;
                }

                Utils.showToast('正在处理图片...', 0);
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const originalDataUrl = event.target.result;
                    try {
                        const compressedDataUrl = await Utils.compressImage(originalDataUrl, 800, 0.9);
                        const imageId = Utils.generateImageId('chat_img');
                        await Utils.saveImageToDB(imageId, compressedDataUrl);
                        this.addMessageToCurrent(imageId, true, false, 'image');
                        Utils.showToast('图片发送成功', 1500);
                    } catch (err) {
                        Utils.showToast('图片处理失败', 2000);
                    }
                };
                reader.readAsDataURL(file);
            },

            async handleSendWithAI() {
                const messageInput = document.getElementById('messageInput');
                const recordBtn = document.getElementById('recordBtn');
                const loadingIndicator = document.getElementById('loadingIndicator');
                const text = messageInput.value.trim();
                if (!text) return;

                const contact = DataManager.getCurrentContact();
                if (contact.blocked) {
                    Utils.showToast('你已将对方拉黑，无法发送消息');
                    return;
                }

                let config;
                if (contact.configId) {
                    config = DataManager.apiConfigs.find(c => c.id === contact.configId);
                    if (!config) {
                        Utils.showToast('联系人关联的API配置不存在，请重新选择');
                        return;
                    }
                } else {
                    config = DataManager.getActiveConfig();
                }

                if (!config.base_url || !config.api_key || !config.currentModel) {
                    Utils.showToast('请先在设置中配置并激活一个有效的API配置，并拉取模型');
                    return;
                }

                messageInput.disabled = true;
                recordBtn.style.pointerEvents = 'none';
                recordBtn.style.opacity = '0.5';
                loadingIndicator.style.display = 'flex';

                // 获取当前时间信息
                const now = new Date();
                const year = now.getFullYear();
                const month = now.getMonth() + 1;
                const day = now.getDate();
                const hours = now.getHours().toString().padStart(2, '0');
                const minutes = now.getMinutes().toString().padStart(2, '0');
                const timeInfo = `当前现实时间是：${year}年${month}月${day}日 ${hours}:${minutes}`;

                const userInfo = `用户信息：真名：${DataManager.userProfile.realName || '未填写'}，地址：${DataManager.userProfile.address || '未填写'}，LINE号码：${DataManager.userProfile.lineId || '未填写'}，个性签名：${DataManager.userProfile.bio || '未填写'}，用户设定：${DataManager.userProfile.userSetting || '未填写'}`;

                this.addMessageToCurrent(text, true, false, 'text');
                messageInput.value = '';

                const messages = [
                    { role: 'system', content: timeInfo },
                    { role: 'system', content: userInfo },
                    { role: 'system', content: contact.personality },
                    ...contact.messages.filter(m => m.role !== 'system').map(m => ({ role: m.role, content: m.content }))
                ];

                try {
                    const response = await fetch(`${BACKEND_URL}/api/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            base_url: config.base_url,
                            api_key: config.api_key,
                            model: config.currentModel,
                            messages
                        })
                    });

                    if (!response.ok) {
                        if (response.status === 429) {
                            throw new Error(API_ERRORS[429]);
                        } else if (response.status === 401 || response.status === 403) {
                            throw new Error(API_ERRORS[401]);
                        } else if (response.status >= 500) {
                            throw new Error('服务器错误，请稍后重试');
                        } else {
                            const errorData = await response.json().catch(() => ({}));
                            throw new Error(errorData.message || `请求失败 (${response.status})`);
                        }
                    }

                    const data = await response.json();
                    const reply = data.choices?.[0]?.message?.content || '无回复';
                    this.addMessageToCurrent(reply, false, false, 'text');
                } catch (error) {
                    let errorMsg = error.message;
                    if (error.name === 'TypeError' && error.message.includes('fetch')) {
                        errorMsg = '网络连接失败，请检查网络';
                    }
                    this.addMessageToCurrent('请求失败：' + errorMsg, false, false, 'text');
                    Utils.showToast(errorMsg, 3000);
                } finally {
                    messageInput.disabled = false;
                    recordBtn.style.pointerEvents = 'auto';
                    recordBtn.style.opacity = '1';
                    loadingIndicator.style.display = 'none';
                }
            },

            enterChatDetail(contactId) {
                DataManager.currentContactId = contactId;
                const contact = DataManager.getCurrentContact();

                const detailContactName = document.getElementById('detailContactName');
                if (detailContactName) {
                    detailContactName.textContent = Utils.getDisplayName(contact) + (contact.blocked ? ' (已拉黑)' : '');
                }

                const messageInput = document.getElementById('messageInput');
                const recordBtn = document.getElementById('recordBtn');
                if (contact.blocked) {
                    messageInput.disabled = true;
                    messageInput.placeholder = '你已拉黑该联系人，无法发送消息';
                    recordBtn.style.opacity = '0.5';
                    recordBtn.style.pointerEvents = 'none';
                } else {
                    messageInput.disabled = false;
                    messageInput.placeholder = 'Aa';
                    recordBtn.style.opacity = '1';
                    recordBtn.style.pointerEvents = 'auto';
                }

                const total = contact.messages.length;
                this.currentVisibleStart = Math.max(0, total - INITIAL_MESSAGE_COUNT);
                this.currentVisibleEnd = total;
                this.isLoadingMore = false;
                this.prevStart = this.currentVisibleStart;

                UIManager.updateChatBackground();
                UIManager.renderMessages(contact.messages, this.currentVisibleStart, this.currentVisibleEnd);

                document.getElementById('contactListPage').style.display = 'none';
                document.getElementById('chatDetailPage').style.display = 'flex';
                document.getElementById('contactOptionsPage').style.display = 'none';
            },

            showContactList() {
                document.getElementById('contactListPage').style.display = 'flex';
                document.getElementById('chatDetailPage').style.display = 'none';
                document.getElementById('contactOptionsPage').style.display = 'none';
                UIManager.renderContactList();
            },

            showContactOptions() {
                document.getElementById('contactListPage').style.display = 'none';
                document.getElementById('chatDetailPage').style.display = 'none';
                document.getElementById('contactOptionsPage').style.display = 'flex';
                
                const contact = DataManager.getCurrentContact();
                document.getElementById('optionsPin').textContent = contact.pinned ? '取消置顶' : '置顶联系人';
                document.getElementById('optionsBlock').textContent = contact.blocked ? '解除拉黑' : '拉黑好友';
                document.getElementById('optionsMuteSwitch').checked = contact.muted;
            },

            deleteContact(id) {
                if (DataManager.contacts.length <= 1) {
                    Utils.showToast('至少保留一个联系人');
                    return;
                }
                DataManager.contacts = DataManager.contacts.filter(c => c.id !== id);
                if (DataManager.currentContactId === id) {
                    DataManager.currentContactId = DataManager.contacts[0].id;
                }
                DataManager.saveContacts();
                UIManager.renderContactList();
                UIManager.renderFriendsList();
                this.showContactList();
            },

            async loadMoreMessages() {
                if (this.isLoadingMore) return;
                const contact = DataManager.getCurrentContact();
                if (this.currentVisibleStart <= 0) return;

                this.isLoadingMore = true;
                const loadingIndicator = document.getElementById('loadingMoreIndicator');
                if (loadingIndicator) loadingIndicator.classList.add('show');

                await new Promise(resolve => setTimeout(resolve, 300));

                const newStart = Math.max(0, this.currentVisibleStart - LOAD_MORE_COUNT);
                this.currentVisibleStart = newStart;
                UIManager.renderMessages(contact.messages, this.currentVisibleStart, this.currentVisibleEnd);

                this.isLoadingMore = false;
            },

            // 撤回消息（只修改type和content，保留原timestamp）
            recallMessage(index) {
                const contact = DataManager.getCurrentContact();
                const msg = contact.messages[index];
                if (!msg || msg.role !== 'user') return; // 只能撤回自己的消息
                if (Utils.isRecallMessage(msg)) return; // 已撤回

                msg.type = 'recall';
                msg.content = '您撤回了一条消息';
                // 保留原timestamp不变
                DataManager.saveContacts();
                // 重新渲染当前可见范围
                UIManager.renderMessages(contact.messages, this.currentVisibleStart, this.currentVisibleEnd);
                Utils.showToast('已撤回', 1500);
            },

            // 处理长按开始
            handleLongPressStart(e, index) {
                if (this.longPressTimer) clearTimeout(this.longPressTimer);
                const row = e.currentTarget;
                const msg = DataManager.getCurrentContact().messages[index];
                if (!msg || msg.role !== 'user' || Utils.isRecallMessage(msg)) return; // 只能长按自己的、未撤回的消息

                this.longPressTimer = setTimeout(() => {
                    if (confirm('确定要撤回这条消息吗？')) {
                        this.recallMessage(index);
                    }
                    this.longPressTimer = null;
                }, 500); // 500ms长按
            },

            handleLongPressEnd() {
                if (this.longPressTimer) {
                    clearTimeout(this.longPressTimer);
                    this.longPressTimer = null;
                }
            }
        };

        // ==================== 配置处理模块 ====================
        const ConfigHandler = {
            async fetchModelsForConfig(configId) {
                const config = DataManager.apiConfigs.find(c => c.id === configId);
                if (!config) return;
                if (!config.base_url || !config.api_key) {
                    Utils.showToast('请先填写 Base URL 和 API Key');
                    return;
                }
                const fetchBtns = document.querySelectorAll('.config-model-row button');
                fetchBtns.forEach(b => b.disabled = true);
                try {
                    const response = await fetch(`${BACKEND_URL}/api/models`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ base_url: config.base_url, api_key: config.api_key })
                    });
                    const data = await response.json();
                    if (data.models && Array.isArray(data.models)) {
                        config.models = data.models;
                        if (!config.currentModel || !config.models.some(m => m.id === config.currentModel)) {
                            config.currentModel = config.models[0]?.id || '';
                        }
                        DataManager.saveConfigs();
                        UIManager.renderConfigList();
                    } else {
                        Utils.showToast('返回的模型列表格式不正确');
                    }
                } catch (error) {
                    Utils.showToast('拉取失败：' + error.message);
                } finally {
                    fetchBtns.forEach(b => b.disabled = false);
                }
            },

            editConfig(id) {
                const config = DataManager.apiConfigs.find(c => c.id === id);
                if (!config) return;
                const item = document.querySelector(`.config-item[data-id="${id}"]`);
                if (!item) return;
                const existingForm = item.querySelector('.edit-form');
                if (existingForm) {
                    existingForm.remove();
                    return;
                }
                const form = document.createElement('div');
                form.className = 'edit-form';
                form.innerHTML = `
                    <input type="text" id="edit_name_${id}" placeholder="配置名称" value="${config.name}">
                    <input type="text" id="edit_url_${id}" placeholder="Base URL" value="${config.base_url || ''}">
                    <input type="text" id="edit_key_${id}" placeholder="API Key" value="${config.api_key || ''}">
                    <div>
                        <button class="save-edit" data-id="${id}">保存</button>
                        <button class="cancel-edit">取消</button>
                    </div>
                `;
                item.appendChild(form);

                form.querySelector('.save-edit').addEventListener('click', () => {
                    const newName = document.getElementById(`edit_name_${id}`).value.trim();
                    const newUrl = document.getElementById(`edit_url_${id}`).value.trim();
                    const newKey = document.getElementById(`edit_key_${id}`).value.trim();
                    if (!newName) {
                        Utils.showToast('请输入配置名称');
                        return;
                    }
                    config.name = newName;
                    config.base_url = newUrl;
                    config.api_key = newKey;
                    DataManager.saveConfigs();
                    UIManager.renderConfigList();
                });

                form.querySelector('.cancel-edit').addEventListener('click', () => {
                    form.remove();
                });
            },

            deleteConfig(id) {
                if (DataManager.apiConfigs.length <= 1) {
                    Utils.showToast('至少保留一个配置');
                    return;
                }
                if (!confirm('确定删除此配置吗？')) return;
                DataManager.apiConfigs = DataManager.apiConfigs.filter(c => c.id !== id);
                if (DataManager.activeConfigId === id) {
                    DataManager.activeConfigId = DataManager.apiConfigs[0].id;
                }
                DataManager.contacts.forEach(c => { if (c.configId === id) c.configId = ''; });

                DataManager.saveConfigs();
                UIManager.renderConfigList();
            }

            });
            document.getElementById('recordBtn').addEventListener('click', () => ChatHandler.handleSendWithAI());

            // 为消息列表添加长按事件委托（消息撤回）
            document.getElementById('messageArea').addEventListener('touchstart', (e) => {
                const msgRow = e.target.closest('.message');
                if (!msgRow) return;
                const index = msgRow.dataset.index;
                if (index !== undefined) {
                    ChatHandler.handleLongPressStart(e, parseInt(index));
                }
            });
            document.getElementById('messageArea').addEventListener('touchend', () => {
                ChatHandler.handleLongPressEnd();
            });
            document.getElementById('messageArea').addEventListener('touchcancel', () => {
                ChatHandler.handleLongPressEnd();
            });
            // 同时支持鼠标右键（开发调试）
            document.getElementById('messageArea').addEventListener('contextmenu', (e) => {
                e.preventDefault();
                const msgRow = e.target.closest('.message');
                if (!msgRow) return;
                const index = msgRow.dataset.index;
                if (index !== undefined) {
                    const msg = DataManager.getCurrentContact().messages[index];
                    if (msg && msg.role === 'user' && !Utils.isRecallMessage(msg)) {
                        if (confirm('确定要撤回这条消息吗？')) {
                            ChatHandler.recallMessage(parseInt(index));
                        }
                    }
                }
            });

            const tabItems = document.querySelectorAll('.tab-item');
            const chatsTab = document.getElementById('chatsTab');
            const friendsTab = document.getElementById('friendsTab');
            const dynamicTab = document.getElementById('dynamicTab');
            tabItems.forEach(item => {
                item.addEventListener('click', () => {
                    tabItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    const tab = item.dataset.tab;
                    if (tab === 'chats') {
                        chatsTab.style.display = 'block';
                        friendsTab.style.display = 'none';
                        dynamicTab.style.display = 'none';
                        UIManager.renderContactList();
                    } else if (tab === 'friends') {
                        chatsTab.style.display = 'none';
                        friendsTab.style.display = 'block';
                        dynamicTab.style.display = 'none';
                        UIManager.renderFriendsList();
                    } else if (tab === 'dynamic') {
                        chatsTab.style.display = 'none';
                        friendsTab.style.display = 'none';
                        dynamicTab.style.display = 'flex';
                    }
                });
            });

            function updateTime() {
                const now = new Date();
                const hours = now.getHours().toString().padStart(2, '0');
                const minutes = now.getMinutes().toString().padStart(2, '0');
                document.getElementById('currentTime').textContent = `${hours}:${minutes}`;
            }
            updateTime();
            setInterval(updateTime, 1000);
        }

        // ==================== 应用视图切换 ====================
        function hideAllAppViews() {
            document.getElementById('chatView').classList.remove('active');
            document.getElementById('settingsView').classList.remove('active');
            document.getElementById('worldBookView').classList.remove('active');
            document.getElementById('beautifyView').classList.remove('active');
            document.getElementById('browserView').classList.remove('active');
            document.getElementById('phoneView').classList.remove('active');
            document.getElementById('userProfileView').classList.remove('active');
            document.getElementById('userArchiveView').classList.remove('active');
            document.getElementById('decorateView').classList.remove('active');
        }

        function openApp(app) {
            hideAllAppViews();
            if (app === 'chat') {
                document.getElementById('chatView').classList.add('active');
                ChatHandler.showContactList();
            } else if (app === 'settings') {
                document.getElementById('settingsView').classList.add('active');
                UIManager.renderConfigList();
            } else if (app === 'worldbook') {
                document.getElementById('worldBookView').classList.add('active');
            } else if (app === 'beautify') {
                document.getElementById('beautifyView').classList.add('active');
            } else if (app === 'browser') {
                document.getElementById('browserView').classList.add('active');
            } else if (app === 'phone') {
                document.getElementById('phoneView').classList.add('active');
            }
        }

        // ==================== 初始化入口 ====================
        document.addEventListener('DOMContentLoaded', async function() {
            DataManager.loadConfigs();
            DataManager.loadContacts();
            DataManager.loadUserProfile();
            DataManager.loadBeautifySettings();

            await UIManager.updateUserProfileDisplay();
            UIManager.renderContactList();
            UIManager.renderFriendsList();
            UIManager.renderIconGrid();
            UIManager.applyAllAppIcons();
            if (DataManager.beautifySettings.bubbleCss) {
                UIManager.applyBubbleCss(DataManager.beautifySettings.bubbleCss);
            }
            document.getElementById('bubbleCssInput').value = DataManager.beautifySettings.bubbleCss || '';

            (function setupProfileAvatar() {
                const avatarDiv = document.getElementById('profileAvatar');
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = 'image/*';
                fileInput.style.display = 'none';
                document.body.appendChild(fileInput);

                avatarDiv.addEventListener('click', () => {
                    fileInput.click();
                });

                fileInput.addEventListener('change', async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = async (event) => {
                        Utils.showToast('正在处理头像...', 0);
                        const originalDataUrl = event.target.result;
                        try {
                            const compressedDataUrl = await Utils.compressImage(originalDataUrl, 200, 0.8);
                            const imageId = Utils.generateImageId('user_avatar');
                            await Utils.saveImageToDB(imageId, compressedDataUrl);
                            DataManager.userProfile.avatar = imageId;
                            DataManager.saveUserProfile();
                            await UIManager.updateUserProfileDisplay();
                            Utils.showToast('头像更新成功', 1500);
                        } catch (err) {
                            Utils.showToast('图片处理失败', 2000);
                        }
                    };
                    reader.readAsDataURL(file);
                });
            })();

            bindEvents();
        });
    </script>
</body>
</html>
